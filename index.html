			const cx = (...classes) => classes.filter(Boolean).join(' ');

			function applyTheme(theme) {
				const root = document.documentElement;
				if (theme === 'dark') root.classList.add('dark');
				else root.classList.remove('dark');
				document.body.className = cx(
					'min-h-screen',
					'antialiased',
					theme === 'dark' ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-800',
				);
			}

			function Toast({ show, text }) {
				return (
					<div
						className={cx(
							'fixed bottom-5 left-1/2 -translate-x-1/2 z-[9999] safe-pad',
							'px-4 py-2 rounded-2xl shadow-soft backdrop-blur',
							'border text-sm font-semibold',
							show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2 pointer-events-none',
							'bg-white/90 border-slate-200 text-slate-900',
							'dark:bg-slate-900/80 dark:border-slate-700 dark:text-slate-100',
						)}>
						{text}
					</div>
				);
			}

			function BackToTop({ show, onClick, t }) {
				return (
					<button
						onClick={onClick}
						className={cx(
							'fixed right-4 bottom-20 md:bottom-6 z-[9997] safe-pad',
							'rounded-2xl px-4 py-3 font-extrabold shadow-soft border',
							'bg-white/90 dark:bg-slate-900/80 backdrop-blur',
							'border-slate-200 dark:border-slate-700',
							'text-slate-900 dark:text-slate-100',
							'hover:shadow-lg active:scale-[0.99]',
							show ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2 pointer-events-none',
						)}
						type='button'>
						<i className='fa-solid fa-arrow-up mr-2'></i>
						{t.goTop}
					</button>
				);
			}

			function ChatModal({ open, onClose, t, lang }) {
				const [input, setInput] = useState('');
				const [loading, setLoading] = useState(false);
				const [err, setErr] = useState('');
				const listRef = useRef(null);

				const [messages, setMessages] = useState(() => {
					try {
						const raw = localStorage.getItem(STORAGE_KEYS.chat);
						const parsed = raw ? JSON.parse(raw) : {};
						return parsed?.[lang] || [{ role: 'ai', text: t.aiHint }];
					} catch {
						return [{ role: 'ai', text: t.aiHint }];
					}
				});

				useEffect(() => {
					const raw = localStorage.getItem(STORAGE_KEYS.chat);
					const parsed = raw ? JSON.parse(raw) : {};
					parsed[lang] = messages;
					localStorage.setItem(STORAGE_KEYS.chat, JSON.stringify(parsed));
				}, [messages, lang]);

				useEffect(() => {
					if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight;
				}, [messages, loading]);

				async function send() {
					const text = input.trim();
					if (!text || loading) return;

					setErr('');
					setInput('');
					setMessages(prev => [...prev, { role: 'user', text }]);
					setLoading(true);

					try {
						const r = await fetch('http://localhost:3000/api/gemini', {
							method: 'POST',
							headers: { 'Content-Type': 'application/json' },
							body: JSON.stringify({
								message: text,
								lang,
								context: "Bu sayt Qaraqalpaq_sózlik: so'zlar izohi, misollar va audio talaffuz.",
							}),
						});

						const data = await r.json();
						if (!r.ok) throw new Error(data?.error || 'Request failed');
						setMessages(prev => [...prev, { role: 'ai', text: data.text }]);
					} catch (e) {
						setErr(t.aiErr);
					} finally {
						setLoading(false);
					}
				}

				function onKeyDown(e) {
					if (e.key === 'Enter' && !e.shiftKey) {
						e.preventDefault();
						send();
					}
				}

				function clearChat() {
					setMessages([{ role: 'ai', text: t.aiHint }]);
				}

				if (!open) return null;

				return (
					<div className='fixed inset-0 z-[9998]'>
						<div className='absolute inset-0 bg-black/55' onClick={onClose}></div>

						<div className='absolute inset-x-0 bottom-0 md:inset-0 md:flex md:items-center md:justify-center p-3 safe-pad'>
							<div className='w-full md:max-w-2xl bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-2xl overflow-hidden'>
								<div className='flex items-center justify-between px-4 md:px-5 py-4 border-b border-slate-200 dark:border-slate-800'>
									<div className='flex items-center gap-3'>
										<div className='w-10 h-10 rounded-2xl bg-blue-600/10 dark:bg-blue-500/15 flex items-center justify-center'>
											<i className='fa-solid fa-wand-magic-sparkles text-blue-700 dark:text-blue-300'></i>
										</div>
										<div>
											<div className='font-extrabold text-slate-900 dark:text-white'>{t.aiTitle}</div>
											<div className='text-xs text-slate-500 dark:text-slate-300'>API: server.js → /api/gemini</div>
										</div>
									</div>
									<div className='flex items-center gap-2'>
										<button
											onClick={clearChat}
											className='px-3 py-2 rounded-xl text-sm font-extrabold border border-slate-200 dark:border-slate-800 hover:shadow'
											type='button'>
											<i className='fa-solid fa-broom mr-2'></i>
											{t.aiClear}
										</button>
										<button
											onClick={onClose}
											className='w-11 h-11 rounded-xl border border-slate-200 dark:border-slate-800 hover:shadow'
											type='button'
											aria-label='close'>
											<i className='fa-solid fa-xmark'></i>
										</button>
									</div>
								</div>

								<div ref={listRef} className='h-[55vh] md:h-[420px] overflow-auto px-4 md:px-5 py-4 space-y-3'>
									{messages.map((m, idx) => (
										<div key={idx} className={cx('flex', m.role === 'user' ? 'justify-end' : 'justify-start')}>
											<div
												className={cx(
													'max-w-[88%] md:max-w-[85%] rounded-2xl px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap',
													m.role === 'user'
														? 'bg-blue-600 text-white'
														: 'bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800',
												)}>
												{m.text}
											</div>
										</div>
									))}

									{loading && (
										<div className='flex justify-start'>
											<div className='max-w-[85%] rounded-2xl px-4 py-3 text-sm bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800'>
												<i className='fa-solid fa-spinner fa-spin mr-2'></i>
												{t.aiThinking}
											</div>
										</div>
									)}

									{err && (
										<div className='rounded-2xl px-4 py-3 text-sm bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 text-red-700 dark:text-red-200'>
											<i className='fa-solid fa-triangle-exclamation mr-2'></i>
											{err}
										</div>
									)}
								</div>

								<div className='px-4 md:px-5 py-4 border-t border-slate-200 dark:border-slate-800'>
									<div className='flex gap-2'>
										<textarea
											className='w-full resize-none h-12 md:h-14 rounded-2xl px-4 py-3 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 outline-none'
											placeholder={t.aiPlaceholder}
											value={input}
											onChange={e => setInput(e.target.value)}
											onKeyDown={onKeyDown}
										/>
										<button
											onClick={send}
											disabled={loading}
											className={cx(
												'px-5 rounded-2xl font-extrabold',
												'bg-blue-600 text-white hover:bg-blue-700 active:scale-[0.99]',
												loading ? 'opacity-70 cursor-not-allowed' : '',
											)}
											type='button'>
											<i className='fa-solid fa-paper-plane mr-2'></i>
											{t.aiSend}
										</button>
									</div>
									<div className='mt-2 text-xs text-slate-500 dark:text-slate-300'>Enter - jiberiw, Shift+Enter - jańa qatar</div>
								</div>
							</div>
						</div>
					</div>
				);
			}

			function App() {
				const [theme, setTheme] = useState(() => localStorage.getItem(STORAGE_KEYS.theme) || 'light');
				const [lang, setLang] = useState(() => localStorage.getItem(STORAGE_KEYS.lang) || 'kaa');
				const [menuOpen, setMenuOpen] = useState(false);
				const [toast, setToast] = useState({ show: false, text: '' });
				const [chatOpen, setChatOpen] = useState(false);
				const [showTop, setShowTop] = useState(false);

				const [query, setQuery] = useState('');
				const [suggestOpen, setSuggestOpen] = useState(false);

				const t = useMemo(() => i18n[lang] || i18n.kaa, [lang]);

				const suggestions = useMemo(() => {
					const base = [
						{ label: 'Imidj nima?', go: 'izlew.html' },
						{ label: 'Diktsiya nima?', go: 'izlew.html' },
						{ label: 'Boshlovchilik qoidalari', go: 'izlew.html' },
						{ label: 'Audio talaffuz', go: 'qosiq.html' },
					];
					const q = query.trim().toLowerCase();
					if (!q) return base.slice(0, 4);
					return base.filter(x => x.label.toLowerCase().includes(q)).slice(0, 4);
				}, [query]);

				function showToast(text) {
					setToast({ show: true, text });
					window.clearTimeout(window.__qs_toast);
					window.__qs_toast = window.setTimeout(() => setToast({ show: false, text: '' }), 1700);
				}

				useEffect(() => {
					applyTheme(theme);
					localStorage.setItem(STORAGE_KEYS.theme, theme);
				}, [theme]);

				useEffect(() => {
					localStorage.setItem(STORAGE_KEYS.lang, lang);
				}, [lang]);

				useEffect(() => {
					const onScroll = () => setShowTop(window.scrollY > 500);
					onScroll();
					window.addEventListener('scroll', onScroll, { passive: true });
					return () => window.removeEventListener('scroll', onScroll);
				}, []);

				useEffect(() => {
					const onOnline = () => showToast(t.toastOnline);
					const onOffline = () => showToast(t.toastOffline);
					window.addEventListener('online', onOnline);
					window.addEventListener('offline', onOffline);
					return () => {
						window.removeEventListener('online', onOnline);
						window.removeEventListener('offline', onOffline);
					};
				}, [t]);

				function handleThemeToggle() {
					setTheme(p => (p === 'dark' ? 'light' : 'dark'));
					showToast(t.toastSaved);
				}

				function handleLangChange(code) {
					setLang(code);
					showToast(t.toastSaved);
					setMenuOpen(false);
				}

				const nav = [
					{ label: t.navNews, href: 'janaliq.html' },
					{ label: t.navFeedback, href: 'fikir1.html' },
					{ label: t.navRegister, href: 'baylanıs.html' },
					{ label: t.navTeam, href: 'komanda.html' },
				];

				function goSearch() {
					window.location.href = 'izlew.html';
				}

				function onSearchKey(e) {
					if (e.key === 'Enter') goSearch();
					if (e.key === 'Escape') setSuggestOpen(false);
				}

				function scrollTop() {
					window.scrollTo({ top: 0, behavior: 'smooth' });
				}

				return (
					<div className='flex flex-col min-h-screen'>
						{/* Header / Navigatsiya */}
						<header className='sticky top-0 z-[50] w-full border-b bg-white/80 dark:bg-slate-950/80 backdrop-blur border-slate-200 dark:border-slate-800'>
							<div className='max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between'>
								<a href='#' className='flex items-center gap-2 font-black text-xl tracking-tight'>
									<i className='fa-solid fa-book-open text-blue-600'></i>
									<span className='brand-grad'>{t.brand}</span>
								</a>

								{/* Desktop Menu */}
								<nav className='hidden md:flex items-center gap-6'>
									{nav.map((item, idx) => (
										<a key={idx} href={item.href} className='text-sm font-semibold hover:text-blue-600 transition-colors'>
											{item.label}
										</a>
									))}
								</nav>

								{/* O'ng tarafdagi tugmalar (Til, Tema, AI) */}
								<div className='hidden md:flex items-center gap-3'>
									{/* Til tanlash */}
									<div className='flex bg-slate-100 dark:bg-slate-900 rounded-xl p-1 border border-slate-200 dark:border-slate-800'>
										{LANGS.map(l => (
											<button
												key={l.code}
												onClick={() => handleLangChange(l.code)}
												className={cx(
													'px-2.5 py-1 text-xs font-bold rounded-lg',
													lang === l.code ? 'bg-white dark:bg-slate-800 shadow text-blue-600' : 'text-slate-500',
												)}>
												{l.code.toUpperCase()}
											</button>
										))}
									</div>

									{/* Tema tugmasi */}
									<button
										onClick={handleThemeToggle}
										className='w-10 h-10 rounded-xl flex items-center justify-center border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-sm'>
										<i className={cx('fa-solid', theme === 'dark' ? 'fa-sun text-amber-500' : 'fa-moon text-indigo-600')}></i>
									</button>

									{/* AI Tugmasi */}
									<button
										onClick={() => setChatOpen(true)}
										className='bg-blue-600 text-white font-bold text-sm px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-blue-700 shadow-md animate-[pulse_3s_infinite]'>
										<i className='fa-solid fa-wand-magic-sparkles'></i>
										{t.aiBtn}
									</button>
								</div>

								{/* Mobil Menu Tugmasi */}
								<div className='flex md:hidden items-center gap-2'>
									<button
										onClick={() => setChatOpen(true)}
										className='w-10 h-10 bg-blue-600/10 text-blue-600 rounded-xl flex items-center justify-center'>
										<i className='fa-solid fa-wand-magic-sparkles'></i>
									</button>
									<button
										onClick={() => setMenuOpen(!menuOpen)}
										className='w-10 h-10 border border-slate-200 dark:border-slate-800 rounded-xl flex items-center justify-center'>
										<i className={cx('fa-solid', menuOpen ? 'fa-xmark' : 'fa-bars')}></i>
									</button>
								</div>
							</div>

							{/* Mobil Menu Oynasi */}
							{menuOpen && (
								<div className='md:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 px-4 py-4 space-y-4 shadow-xl'>
									<div className='grid grid-cols-2 gap-2'>
										{nav.map((item, idx) => (
											<a
												key={idx}
												href={item.href}
												className='p-3 bg-slate-50 dark:bg-slate-900 rounded-xl text-center font-semibold text-sm'>
												{item.label}
											</a>
										))}
									</div>
									<div className='flex items-center justify-between pt-2 border-t border-slate-100 dark:border-slate-900'>
										<span className='text-sm font-bold'>{theme === 'dark' ? t.themeNight : t.themeDay}</span>
										<button
											onClick={handleThemeToggle}
											className='w-10 h-10 border dark:border-slate-800 rounded-xl flex items-center justify-center'>
											<i className={cx('fa-solid', theme === 'dark' ? 'fa-sun text-amber-500' : 'fa-moon text-indigo-600')}></i>
										</button>
									</div>
									<div className='flex items-center justify-between pt-2'>
										<span className='text-sm font-bold'>Til / Til:</span>
										<div className='flex bg-slate-100 dark:bg-slate-900 rounded-xl p-1 border border-slate-200 dark:border-slate-800'>
											{LANGS.map(l => (
												<button
													key={l.code}
													onClick={() => handleLangChange(l.code)}
													className={cx(
														'px-3 py-1 text-xs font-bold rounded-lg',
														lang === l.code ? 'bg-white dark:bg-slate-800 shadow text-blue-600' : 'text-slate-500',
													)}>
													{l.label}
												</button>
											))}
										</div>
									</div>
								</div>
							)}
						</header>

						{/* Asosiy Main Qism */}
						<main className='flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 space-y-12'>
							{/* --- KIBER ANIMATSIYALI HERO SECTION --- */}
							<section className='relative text-center space-y-6 max-w-4xl mx-auto py-10 px-6 rounded-[32px] overflow-hidden bg-white/40 dark:bg-slate-900/30 border border-slate-200/50 dark:border-slate-800/50 shadow-cyber backdrop-blur-md'>
								{/* Orqa fondagi yorug'lik effektlari */}
								<div className='absolute top-0 left-1/4 w-72 h-72 bg-blue-500/10 dark:bg-blue-500/20 rounded-full blur-[100px] pointer-events-none'></div>
								<div className='absolute bottom-0 right-1/4 w-72 h-72 bg-purple-500/10 dark:bg-purple-500/15 rounded-full blur-[100px] pointer-events-none'></div>

								<div className='relative space-y-4'>
									{/* Neon gradianli sarlavha */}
									<h1 className='text-4xl md:text-6xl font-black tracking-tight leading-tight cyber-hero-title'>{t.heroTitle}</h1>
									<p className='text-slate-500 dark:text-slate-400 text-sm md:text-lg max-w-2xl mx-auto font-medium'>
										{t.heroSubtitle}
									</p>
								</div>

								{/* Qidiruv qutisi */}
								<div className='relative max-w-xl mx-auto pt-2'>
									{/* Qidiruv tavsiyalari */}
									{suggestOpen && (
										<div className='absolute left-0 right-0 mt-2 bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-2xl overflow-hidden z-20 text-left backdrop-blur'>
											<div className='p-2 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50'>
												<span className='text-xs font-bold text-slate-400 uppercase tracking-wider px-2'>{t.quickTitle}</span>
												<button
													onClick={() => setSuggestOpen(false)}
													className='text-xs text-blue-600 dark:text-blue-400 font-bold px-2 py-1 hover:bg-blue-50 dark:hover:bg-slate-800 rounded-lg'>
													X
												</button>
											</div>
											<div className='divide-y divide-slate-100 dark:divide-slate-800'>
												{suggestions.map((s, i) => (
													<div
														key={i}
														onClick={() => {
															window.location.href = s.go;
														}}
														className='p-3 hover:bg-blue-50/80 dark:hover:bg-blue-950/40 cursor-pointer flex items-center justify-between text-sm transition-colors'>
														<span className='font-semibold text-slate-700 dark:text-slate-200'>
															<i className='fa-regular fa-file-lines mr-2.5 text-blue-500'></i>
															{s.label}
														</span>
														<i className='fa-solid fa-chevron-right text-xs text-slate-400'></i>
													</div>
												))}
											</div>
										</div>
									)}
								</div>
							</section>

							{/* Bo'limlar - Cyber Glow Cards */}
							<section className='space-y-6'>
								<h2 className='text-xl md:text-2xl font-extrabold flex items-center gap-2'>
									<span className='w-2.5 h-6 bg-gradient-to-b from-blue-600 to-sky-400 rounded-md inline-block'></span>
									{t.sections}
								</h2>
								<div className='grid md:grid-cols-2 gap-6'>
									{/* Card 1 */}
									<div className='cyber-bg-glow bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-sm hover:shadow-md flex flex-col justify-between group'>
										<div className='space-y-3'>
											<h3 className='text-xl font-extrabold group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors'>
												{t.cardDictTitle}
											</h3>
											<p className='text-sm text-slate-500 dark:text-slate-400 leading-relaxed'>{t.cardDictDesc}</p>
										</div>
										<a
											href='izlew.html'
											className='mt-6 inline-flex items-center justify-center font-bold bg-slate-100 dark:bg-slate-800 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-600 px-4 py-2.5 rounded-xl text-sm gap-2 transition-all'>
											{t.cardOpen} <i className='fa-solid fa-arrow-right text-xs'></i>
										</a>
									</div>
									{/* Card 2 */}
									<div className='cyber-bg-glow bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-sm hover:shadow-md flex flex-col justify-between group'>
										<div className='space-y-3'>
											<h3 className='text-xl font-extrabold group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors'>
												{t.cardAudioTitle}
											</h3>
											<p className='text-sm text-slate-500 dark:text-slate-400 leading-relaxed'>{t.cardAudioDesc}</p>
										</div>
										<a
											href='qosiq.html'
											className='mt-6 inline-flex items-center justify-center font-bold bg-slate-100 dark:bg-slate-800 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-600 px-4 py-2.5 rounded-xl text-sm gap-2 transition-all'>
											{t.cardOpen} <i className='fa-solid fa-arrow-right text-xs'></i>
										</a>
									</div>
								</div>
							</section>

							{/* Sayt haqida va Hikmatli so'zlar */}
							<div className='grid md:grid-cols-3 gap-6'>
								<section className='md:col-span-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl space-y-3'>
									<h3 className='text-lg font-extrabold'>{t.aboutTitle}</h3>
									<p className='text-sm text-slate-500 dark:text-slate-400 leading-relaxed'>{t.aboutText}</p>
								</section>

								<section className='bg-gradient-to-br from-blue-600 via-sky-500 to-purple-600 text-white p-6 rounded-3xl space-y-3 shadow-md relative overflow-hidden'>
									<div className='absolute -right-6 -bottom-6 text-white/10 text-7xl font-black pointer-events-none'>
										<i className='fa-solid fa-quote-right'></i>
									</div>
									<h3 className='text-lg font-bold'>
										<i className='fa-solid fa-quote-left mr-2'></i>
										{t.rememberTitle}
									</h3>
									<div className='text-sm italic space-y-1 opacity-95 leading-relaxed'>
										<p>{t.q1}</p>
										<p>{t.q2}</p>
										<p>{t.q3}</p>
									</div>
									<p className='text-xs font-bold text-right pt-2 opacity-80'>{t.author}</p>
								</section>
							</div>
						</main>

						{/* Footer */}
						<footer className='mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950'>
							<div className='max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid md:grid-cols-3 gap-8 text-sm'>
								<div className='space-y-3'>
									<div className='font-black text-lg tracking-tight brand-grad'>{t.brand}</div>
									<p className='text-slate-500 dark:text-slate-400 text-xs leading-relaxed'>
										&copy; {new Date().getFullYear()} {t.rights}
									</p>
								</div>
								<div className='space-y-2'>
									<div className='font-bold text-slate-400 uppercase tracking-wider text-xs'>{t.contactTitle}</div>
									<div className='space-y-1 text-xs'>
										<p>
											<strong>{t.founderName}</strong> - <span className='text-slate-500'>{t.founder}</span>
										</p>
										<p>
											<strong>{t.techName}</strong> - <span className='text-slate-500'>{t.tech}</span>
										</p>
									</div>
								</div>
								<div className='space-y-2'>
									<div className='font-bold text-slate-400 uppercase tracking-wider text-xs'>{t.socialTitle}</div>
									<div className='flex gap-3 text-lg'>
										<a href='#' aria-label='Telegram' className='hover:text-blue-500'>
											<i className='fa-brands fa-telegram'></i>
										</a>
										<a href='#' aria-label='Instagram' className='hover:text-pink-500'>
											<i className='fa-brands fa-instagram'></i>
										</a>
										<a href='#' aria-label='YouTube' className='hover:text-red-500'>
											<i className='fa-brands fa-youtube'></i>
										</a>
									</div>
								</div>
							</div>
						</footer>

						{/* Modallar va Bildirishnomalar */}
						<ChatModal open={chatOpen} onClose={() => setChatOpen(false)} t={t} lang={lang} />
						<Toast show={toast.show} text={toast.text} />
						<BackToTop show={showTop} onClick={scrollTop} t={t} />
					</div>
				);
			}

			ReactDOM.createRoot(document.getElementById('root')).render(<App />);
		</script>
	</body>
</html>
